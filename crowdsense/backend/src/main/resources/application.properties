# backend/src/main/resources/application.properties
# ─────────────────────────────────────────────────────────────────────────────
# CrowdSense Backend — Spring Boot 3.2 / Java 17
# VERIFIED WORKING — do not modify datasource without testing first
# ─────────────────────────────────────────────────────────────────────────────

spring.application.name=crowdsense-backend
server.port=8080

# ── Supabase — Transaction Pooler ────────────────────────────────────────────
# Host prefix MUST be aws-1- (verified). Port MUST be 6543 (transaction mode).
# prepareThreshold=0 disables server-side prepared statements (required for pooler).
spring.datasource.url=jdbc:postgresql://aws-1-ap-south-1.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0
spring.datasource.username=postgres.leihwymwbxgzvzasskzy
spring.datasource.password=Crowd@#101716
spring.datasource.driver-class-name=org.postgresql.Driver

# ── HikariCP connection pool ──────────────────────────────────────────────────
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=300000

# ── JPA ───────────────────────────────────────────────────────────────────────
# ddl-auto=update creates missing columns/tables on startup.
# Switch to 'validate' in production.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Firebase (disabled until FCM is needed) ───────────────────────────────────
firebase.enabled=false
firebase.credentials.path=src/main/resources/firebase-service-account.json

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration.ms=86400000

# ── ML microservice ───────────────────────────────────────────────────────────
ml.service.url=http://localhost:8001

# ── MQTT (local Mosquitto broker for offline mesh) ────────────────────────────
mqtt.broker.url=tcp://localhost:1883
mqtt.topic.crowd=crowd/#
mqtt.enabled=false

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.crowdsense=DEBUG
logging.level.org.hibernate.SQL=WARN
logging.level.com.zaxxer.hikari=WARN
logging.level.org.springframework.security=WARN