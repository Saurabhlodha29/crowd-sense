# Application
spring.application.name=crowdsense-backend
server.port=8080

# Supabase PostgreSQL Connection
# FORMAT: jdbc:postgresql://db.<YOUR_PROJECT_REF>.supabase.co:5432/postgres?sslmode=require
spring.datasource.url=jdbc:postgresql://db.leihwymwbxgzvzasskzy.supabase.co:5432/postgres?sslmode=require
spring.datasource.username=postgres
spring.datasource.password=Crowd@#101716
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool (important for Supabase free tier)
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000  
spring.datasource.hikari.idle-timeout=600000

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# WebSocket
websocket.endpoint=/ws
websocket.topic.crowd=/topic/crowd

# Firebase (leave path as-is, file added later in Phase 5)
firebase.credentials.path=src/main/resources/firebase-service-account.json
firebase.enabled=false

